spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: member-service
              uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
              predicates: [Path=/member-app/**]
            - id: membership-service
              uri: ${MEMBERSHIP_SERVICE_URL:http://localhost:8082}
              predicates: [Path=/membership-app/**]
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
              predicates: [Path=/payment-app/**]
            - id: class-service
              uri: ${CLASS_SERVICE_URL:http://localhost:8084}
              predicates: [Path=/class-app/**]
            - id: booking-service
              uri: ${BOOKING_SERVICE_URL:http://localhost:8085}
              predicates: [Path=/booking-app/**]
            - id: trainer-service
              uri: ${TRAINER_SERVICE_URL:http://localhost:8086}
              predicates: [Path=/trainer-app/**]
            - id: access-service
              uri: ${ACCESS_SERVICE_URL:http://localhost:8087}
              predicates: [Path=/access-app/**]
            - id: equipment-service
              uri: ${EQUIPMENT_SERVICE_URL:http://localhost:8088}
              predicates: [Path=/equipment-app/**]
            - id: branch-service
              uri: ${BRANCH_SERVICE_URL:http://localhost:8089}
              predicates: [Path=/branch-app/**]
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8090}
              predicates: [Path=/notification-app/**]
          default-filters:
            - AddResponseHeader=X-IronFlow-Gateway, api-gateway
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: ['*']
                allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
                allowed-headers: ['*']

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
