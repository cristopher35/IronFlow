spring:
  application:
    name: class-service
  profiles:
    default: h2
  jpa:
    open-in-view: false

services:
  trainer:
    base-url: ${TRAINER_SERVICE_URL:http://localhost:8086/trainer-app}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

server:
  port: ${PORT:8084}
  servlet:
    context-path: /class-app
