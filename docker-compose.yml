services:
  member-service:
    build: ./memberService/memberService/IronFlow
    container_name: member-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${MEMBER_DB_HOST}
      DB_NAME: ${MEMBER_DB_NAME}
      DB_USER: ${MEMBER_DB_USER}
      DB_PASSWORD: ${MEMBER_DB_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - ironflow-net

  membership-service:
    build: ./MemberShip-service/MemberShip-service/MemberShip-service
    container_name: membership-service
    depends_on:
      - member-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${MEMBERSHIP_DB_HOST}
      DB_NAME: ${MEMBERSHIP_DB_NAME}
      DB_USER: ${MEMBERSHIP_DB_USER}
      DB_PASSWORD: ${MEMBERSHIP_DB_PASSWORD}
      MEMBER_SERVICE_URL: http://member-service:8081
    ports:
      - "8082:8082"
    networks:
      - ironflow-net

  payment-service:
    build: ./Payment-service/Payment-service/payment-service
    container_name: payment-service
    depends_on:
      - membership-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${PAYMENT_DB_HOST}
      DB_NAME: ${PAYMENT_DB_NAME}
      DB_USER: ${PAYMENT_DB_USER}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082
    ports:
      - "8083:8083"
    networks:
      - ironflow-net

  booking-service:
    build: ./booking-service/booking-service
    container_name: booking-service
    depends_on:
      - member-service
      - class-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT:-5432}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      MEMBER_SERVICE_URL: http://member-service:8081/member-app
      CLASS_SERVICE_URL: http://class-service:8084/class-app
    ports:
      - "8085:8085"
    networks:
      - ironflow-net

  class-service:
    build: ./class-service/class-service
    container_name: class-service
    depends_on:
      - trainer-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      TRAINER_SERVICE_URL: http://trainer-service:8086/trainer-app
    ports:
      - "8084:8084"
    networks:
      - ironflow-net

  trainer-service:
    build: ./trainer-service/trainer-service
    container_name: trainer-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${TRAINER_DB_HOST}
      DB_PORT: ${TRAINER_DB_PORT:-5432}
      DB_NAME: ${TRAINER_DB_NAME}
      DB_USER: ${TRAINER_DB_USER}
      DB_PASSWORD: ${TRAINER_DB_PASSWORD}
    ports:
      - "8086:8086"
    networks:
      - ironflow-net

  access-service:
    build: ./access-service/access-service
    container_name: access-service
    depends_on:
      - membership-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${ACCESS_DB_HOST}
      DB_PORT: ${ACCESS_DB_PORT:-5432}
      DB_NAME: ${ACCESS_DB_NAME}
      DB_USER: ${ACCESS_DB_USER}
      DB_PASSWORD: ${ACCESS_DB_PASSWORD}
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082/membership-app
    ports:
      - "8087:8087"
    networks:
      - ironflow-net

  equipment-service:
    build: ./equipment-service/equipment-service/equipment-service
    container_name: equipment-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${EQUIPMENT_DB_HOST}
      DB_PORT: ${EQUIPMENT_DB_PORT:-5432}
      DB_NAME: ${EQUIPMENT_DB_NAME}
      DB_USER: ${EQUIPMENT_DB_USER}
      DB_PASSWORD: ${EQUIPMENT_DB_PASSWORD}
    ports:
      - "8088:8088"
    networks:
      - ironflow-net

  branch-service:
    build: ./branch-service/branch-service
    container_name: branch-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${BRANCH_DB_HOST}
      DB_PORT: ${BRANCH_DB_PORT:-5432}
      DB_NAME: ${BRANCH_DB_NAME}
      DB_USER: ${BRANCH_DB_USER}
      DB_PASSWORD: ${BRANCH_DB_PASSWORD}
    ports:
      - "8089:8089"
    networks:
      - ironflow-net

  notification-service:
    build: ./notification-service/notification-service
    container_name: notification-service
    depends_on:
      - member-service
    environment:
      SPRING_PROFILES_ACTIVE: neon
      DB_HOST: ${NOTIFICATION_DB_HOST}
      DB_PORT: ${NOTIFICATION_DB_PORT:-5432}
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USER: ${NOTIFICATION_DB_USER}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      MEMBER_SERVICE_URL: http://member-service:8081/member-app
    ports:
      - "8090:8090"
    networks:
      - ironflow-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - member-service
      - membership-service
      - payment-service
      - booking-service
      - class-service
      - trainer-service
      - access-service
      - equipment-service
      - branch-service
      - notification-service
    environment:
      MEMBER_SERVICE_URL: http://member-service:8081
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      BOOKING_SERVICE_URL: http://booking-service:8085
      CLASS_SERVICE_URL: http://class-service:8084
      TRAINER_SERVICE_URL: http://trainer-service:8086
      ACCESS_SERVICE_URL: http://access-service:8087
      EQUIPMENT_SERVICE_URL: http://equipment-service:8088
      BRANCH_SERVICE_URL: http://branch-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
    ports:
      - "8080:8080"
    networks:
      - ironflow-net

networks:
  ironflow-net:
    driver: bridge
