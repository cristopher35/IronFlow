services:
  discovery-server:
    build:
      context: ./microservicios-ironflow/discovery-server
    container_name: discovery-server
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: discovery-server
    ports:
      - "8761:8761"
    networks:
      - ironflow-net

  member-service:
    build:
      context: ./microservicios-ironflow/member-service
    container_name: member-service
    depends_on:
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    networks:
      - ironflow-net

  membership-service:
    build:
      context: ./microservicios-ironflow/membership-service
    container_name: membership-service
    depends_on:
      - discovery-server
      - member-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBER_SERVICE_URL: http://member-service:8081
    ports:
      - "8082:8082"
    networks:
      - ironflow-net

  payment-service:
    build:
      context: ./microservicios-ironflow/payment-service
    container_name: payment-service
    depends_on:
      - discovery-server
      - membership-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082
    ports:
      - "8083:8083"
    networks:
      - ironflow-net

  booking-service:
    build:
      context: ./microservicios-ironflow/booking-service
    container_name: booking-service
    depends_on:
      - discovery-server
      - member-service
      - class-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBER_SERVICE_URL: http://member-service:8081
      CLASS_SERVICE_URL: http://class-service:8084
    ports:
      - "8085:8085"
    networks:
      - ironflow-net

  class-service:
    build:
      context: ./microservicios-ironflow/class-service
    container_name: class-service
    depends_on:
      - discovery-server
      - trainer-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      TRAINER_SERVICE_URL: http://trainer-service:8086
    ports:
      - "8084:8084"
    networks:
      - ironflow-net

  trainer-service:
    build:
      context: ./microservicios-ironflow/trainer-service
    container_name: trainer-service
    depends_on:
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8086:8086"
    networks:
      - ironflow-net

  access-service:
    build:
      context: ./microservicios-ironflow/access-service
    container_name: access-service
    depends_on:
      - discovery-server
      - membership-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082
    ports:
      - "8087:8087"
    networks:
      - ironflow-net

  equipment-service:
    build:
      context: ./microservicios-ironflow/equipment-service
    container_name: equipment-service
    depends_on:
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8088:8088"
    networks:
      - ironflow-net

  branch-service:
    build:
      context: ./microservicios-ironflow/branch-service
    container_name: branch-service
    depends_on:
      - discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8089:8089"
    networks:
      - ironflow-net

  notification-service:
    build:
      context: ./microservicios-ironflow/notification-service
    container_name: notification-service
    depends_on:
      - discovery-server
      - member-service
    environment:
      SPRING_PROFILES_ACTIVE: h2
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBER_SERVICE_URL: http://member-service:8081
    ports:
      - "8090:8090"
    networks:
      - ironflow-net

  api-gateway:
    build:
      context: ./microservicios-ironflow/api-gateway
    container_name: api-gateway
    depends_on:
      - discovery-server
      - member-service
      - membership-service
      - payment-service
      - booking-service
      - class-service
      - trainer-service
      - access-service
      - equipment-service
      - branch-service
      - notification-service
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      MEMBER_SERVICE_URL: http://member-service:8081
      MEMBERSHIP_SERVICE_URL: http://membership-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      BOOKING_SERVICE_URL: http://booking-service:8085
      CLASS_SERVICE_URL: http://class-service:8084
      TRAINER_SERVICE_URL: http://trainer-service:8086
      ACCESS_SERVICE_URL: http://access-service:8087
      EQUIPMENT_SERVICE_URL: http://equipment-service:8088
      BRANCH_SERVICE_URL: http://branch-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
    ports:
      - "8080:8080"
    networks:
      - ironflow-net

networks:
  ironflow-net:
    driver: bridge
