spring:
  application:
    name: branch-service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

server:
  port: 8089
  servlet:
    context-path: /branch-app

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
