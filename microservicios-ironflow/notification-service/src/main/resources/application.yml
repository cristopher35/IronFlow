spring:
  application:
    name: notification-service
  profiles:
    default: h2
  jpa:
    open-in-view: false

services:
  member:
    base-url: ${MEMBER_SERVICE_URL:http://localhost:8081/member-app}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

server:
  port: ${PORT:8090}
  servlet:
    context-path: /notification-app
