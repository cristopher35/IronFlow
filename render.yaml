services:
  - type: web
    name: ironflow-discovery-server
    runtime: java
    rootDir: discovery-server
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8761
      - key: EUREKA_DEFAULT_ZONE
        sync: false
      - key: EUREKA_INSTANCE_HOSTNAME
        sync: false

  - type: web
    name: ironflow-api-gateway
    runtime: java
    rootDir: api-gateway
