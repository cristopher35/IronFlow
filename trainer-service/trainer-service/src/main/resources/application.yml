spring:
  application:
    name: trainer-service
  profiles:
    default: h2
  jpa:
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

server:
  port: ${PORT:8086}
  servlet:
    context-path: /trainer-app
